<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <img src="./assets/logo.png" alt="" width="400px">
        <p>A platform to help you recover lost items and return found belongings easily.</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="card">
            <input type="text" placeholder="Email or phone" id="email-login">
            <input type="password" placeholder="Password" id="password-login">
            <button class="login-btn" id="login-button">Log In</button>

            <div class="link">Forgot password?</div>

            <hr>

            <button class="signup-btn" onclick="openModal()">Create new account</button>
        </div>
    </div>

</div>

<!-- SIGNUP MODAL -->
<div class="modal" id="signupModal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>Sign Up</h2>
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Last Name">
        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="signup-btn">Sign Up</button>
    </div>
</div>

<script src="login.js">
</script>

</body>
</html>
